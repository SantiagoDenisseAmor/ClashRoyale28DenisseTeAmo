<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash del Amor</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Luckiest Guy',cursive;
height:100vh;
background:url('https://i.postimg.cc/RZ2kHyVf/850d80424364220b7fa6e757dd3716f4.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
transition:opacity .4s ease;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.game{
position:relative;
width:100%;
max-width:430px;
height:100vh;
padding:20px;
color:white;
display:flex;
flex-direction:column;
justify-content:space-between;
z-index:2;
}

.top{
display:flex;
justify-content:space-between;
}

.badge{
background:rgba(0,0,0,0.6);
padding:8px 14px;
border-radius:15px;
font-size:14px;
}

.center{
text-align:center;
margin-top:20px;
}

.chest{
width:180px;
max-width:60%;
cursor:pointer;
transition:0.3s;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.secret{
margin-top:15px;
font-size:15px;
color:#ffeaa7;
min-height:40px;
text-shadow:0 0 8px black;
}

.battle{
margin-bottom:80px;
align-self:center;
background:#ffd200;
color:#5a2d00;
padding:18px 70px;
border-radius:20px;
font-size:26px;
box-shadow:0 8px #c9a500;
cursor:pointer;
transition:0.2s;
animation:pulse 2s infinite;
}

.battle:active{
transform:translateY(6px);
box-shadow:0 2px #c9a500;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.footer{
text-align:center;
font-size:14px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 🎵 Música fondo -->
<audio id="bgMusic" loop>
  <source src="MusicaFondoCRDS.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 Sonidos -->
<audio id="clickSound">
  <source src="SonidoBotonCRDS.mp3" type="audio/mpeg">
</audio>

<audio id="chestSound">
  <source src="SonidoCofreCRDS.mp3" type="audio/mpeg">
</audio>

<div class="game">

<div class="top">
<div class="badge">&#10084;&#65039; Nivel Infinito</div>
<div class="badge">&#128142; Amor Legendario</div>
</div>

<div class="center">
<img id="chest" class="chest" src="https://i.postimg.cc/kXbF5pZp/Picsart-26-02-28-14-57-34-933.jpg">
<div class="secret" id="secret"></div>
</div>

<div class="battle" onclick="goLove()">
BATALLA
</div>

<div class="footer">
Cada partida contigo es victoria &#127942;
</div>

</div>

<script>

// 🎵 Iniciar música cuando toquen pantalla
document.addEventListener("click", function startMusic(){
let music = document.getElementById("bgMusic");
music.volume = 0.4;
music.play();
document.removeEventListener("click", startMusic);
});

// 💌 Mensajes secretos
const mensajes=[
"Tu sonrisa es mi carta favorita &#128150;",
"Eres mi reina legendaria &#128081;",
"Mi coraz&#243;n solo juega contigo &#10084;&#65039;",
"Siempre gano cuando estoy contigo &#128158;",
"Eres mi mejor partida &#129392;",
"Nuestro amor es nivel infinito &#8734;",
"Si esto fuera Clash, t&#250; ser&#237;as mi campeona &#128293;"
];

// 📦 Abrir cofre
document.getElementById("chest").onclick=function(){
let sound=document.getElementById("chestSound");
sound.currentTime=0;
sound.play();

this.style.transform="scale(1.2)";
setTimeout(()=>{this.style.transform="scale(1)";},200);

document.getElementById("secret").innerHTML=
mensajes[Math.floor(Math.random()*mensajes.length)];
};

// ⚔ Botón batalla
function goLove(){
let click=document.getElementById("clickSound");
click.currentTime=0;
click.play();

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="MiniClashRoyaleCHDenniseSantiago.html";
},400);
}

</script>

</body>
</html>
