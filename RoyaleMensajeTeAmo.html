<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victoria Legendaria</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Luckiest Guy',cursive;
height:100vh;
background:url('https://i.postimg.cc/yYHXkPHC/4tmubum345ny.png');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,.6), rgba(120,0,0,.7));
}

.victory{
position:relative;
text-align:center;
z-index:2;
animation:entrada 1s ease-out;
padding:20px;
max-width:400px;
}

@keyframes entrada{
from{opacity:0; transform:scale(.7);}
to{opacity:1; transform:scale(1);}
}

.trophy{
font-size:80px;
animation:flotar 3s infinite ease-in-out;
}

@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.title{
font-size:42px;
color:#ffd200;
text-shadow:0 0 20px gold;
margin-top:10px;
}

.message{
margin-top:20px;
font-size:18px;
line-height:1.5;
text-shadow:0 0 10px black;
min-height:80px;
}

.button{
margin-top:35px;
background:#ffd200;
color:#5a2d00;
padding:18px 70px;
border-radius:20px;
font-size:24px;
box-shadow:0 8px #c9a500;
cursor:pointer;
transition:.2s;
display:inline-block;
}

.button:active{
transform:translateY(6px);
box-shadow:0 2px #c9a500;
}

.particle{
position:absolute;
width:10px;
height:10px;
background:gold;
border-radius:50%;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<audio id="winSound" src="GanarCRDS.mp3" autoplay></audio>

<div class="victory">

<div class="trophy">&#127942;</div>

<div class="title">&#161;VICTORIA!</div>

<div class="message" id="frase"></div>

<div class="button" onclick="location.href='ClashRoyale28AmorDenisse.html'">
VOLVER A JUGAR
</div>

</div>

<script>

const frases=[
"Has ganado mi coraz&#243;n para siempre &#10084;&#65039;",
"Eres mi carta legendaria favorita &#128141;",
"Contigo cada partida es perfecta &#128150;",
"Eres mi reina eterna &#128081;",
"Mi coraz&#243;n solo juega contigo &#128153;",
"Siempre elijo estar contigo &#10084;&#65039;",
"Eres mi mejor victoria &#127942;",
"Nuestro amor es nivel infinito &#8734;",
"Si esto fuera Clash, t&#250; ser&#237;as mi campeona &#128293;"
];

document.getElementById("frase").innerHTML=
frases[Math.floor(Math.random()*frases.length)];

/* Partículas */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.classList.add("particle");
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*3+2)+"s";
p.style.opacity=Math.random();
document.body.appendChild(p);
}

</script>

</body>
</html>
